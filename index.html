<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>プリンセス通信</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- 背景 -->
    <div class="background"></div>

    <!-- 魔法エリア -->
    <div id="magicArea">

        <!-- 宝石（最初だけ表示） -->
        <div id="jewel">💎</div>

        <!-- プリンセス -->
        <img
            id="princess"
            src="normal.png"
            alt="プリンセス"
        >

    </div>

    <!-- メッセージ -->
    <div id="messageBox">

        <p id="message"></p>

    </div>

    <!-- 音声 -->
    <audio id="voice"></audio>

    <!-- JavaScript -->
    <script src="script.js"></script>

</body>
</html>
